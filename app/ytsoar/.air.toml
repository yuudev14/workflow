# .air.toml

# Enable polling mode for Docker bind mounts
poll = true

# Main settings
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api"
bin = "tmp/main"
full_bin = ""
# ts/py: the localexec harnesses are go:embed'ed, so editing one must trigger
# a Go rebuild or the binary keeps running the stale harness
include_ext = ["go", "tpl", "tmpl", "html", "ts", "py"]
exclude_dir = ["vendor", "tmp", ".git", ".idea", ".vscode", "node_modules", ".air"]
exclude_file = []
exclude_regex = []
delay = 1000 # ms

[log]
color = "auto"
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
error = "red"
