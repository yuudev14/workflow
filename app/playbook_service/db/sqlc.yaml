version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema:
      - "migrations"
      - "enums.sql"
    gen:
      go:
        package: "db"
        out: "."
        emit_interface: true
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
