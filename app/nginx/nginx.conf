events {}

http {
    server {
        listen 9999;
        server_name localhost;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /playbook-api/ {
            proxy_pass http://ytsoar_api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect http://localhost/ /playbook-api/;
        }

        location /connector-api/ {
            proxy_pass http://ytsoar_api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect http://localhost/ /connector-api/;
        }

        # websocket upgrade for live playbook status (/ws/playbook). No trailing
        # slash on proxy_pass so the /ws/ path is preserved to the api.
        location /ws/ {
            proxy_pass http://ytsoar_api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
    }
}

