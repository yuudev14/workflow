version: "3.9"
name: ytsoar
networks:
  ytsoar:
services:
  ytsoar_rabbitmq:
    image: rabbitmq:3-management
    container_name: ytsoar_rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ytsoar
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  ytsoar_postgres:
    image: postgres:15
    container_name: ytsoar_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ytsoar
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ytsoar
    volumes:
      - postgres_data:/var/lib/postgresql/data
  ytsoar_api:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_api
    ports:
      - "8080:8080"
    volumes:
      - ../app/ytsoar:/app
      # unified connectors tree: the API is its only writer (metadata now,
      # uploads later)
      - ../app/connectors:/opt/ytsoar/connectors
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=ytsoar_postgres
      - DB_PORT=5432
      - DB_NAME=ytsoar
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - MQ_HOST=ytsoar_rabbitmq
      - MQ_PORT=5672
      - AIR_POLL=true
      - AIR_WATCH_TMOUT=500ms
      - STATUS_EXCHANGE=playbook.status
      - CONNECTORS_DIR=/opt/ytsoar/connectors
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
  ytsoar_playbook_worker:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_playbook_worker
    entrypoint:
      [
        "air",
        "--build.cmd",
        "go build -o ./tmp/worker ./cmd/worker",
        "--build.bin",
        "tmp/worker",
      ]
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - ../app/ytsoar:/app
      # read-only: go builtin connectors load their TOML configs from here
      - ../app/connectors:/opt/ytsoar/connectors:ro
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=ytsoar_postgres
      - DB_PORT=5432
      - DB_NAME=ytsoar
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - MQ_HOST=ytsoar_rabbitmq
      - MQ_PORT=5672
      - AIR_POLL=true
      - STATUS_EXCHANGE=playbook.status
      - SANDBOX_ADDR=ytsoar_sandbox:50052
      - CONNECTORS_DIR=/opt/ytsoar/connectors
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
      ytsoar_sandbox:
        condition: service_started
      # migrations run in the API entrypoint; restart covers the race in dev
      ytsoar_api:
        condition: service_started
  ytsoar_sandbox:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_sandbox
    entrypoint:
      [
        "air",
        "--build.cmd",
        "go build -o ./tmp/sandbox ./cmd/sandbox",
        "--build.bin",
        "tmp/sandbox",
      ]
    restart: unless-stopped
    mem_limit: 1g
    expose:
      - "50052"
    volumes:
      - ../app/ytsoar:/app
      # unified connectors tree, read-only: the sandbox only executes from it
      - ../app/connectors:/opt/ytsoar/connectors:ro
    # deliberately NO DB_*/MQ_* env: the sandbox holds zero credentials
    environment:
      - AIR_POLL=true
      - SANDBOX_LISTEN_ADDR=:50052
      - CONNECTORS_DIR=/opt/ytsoar/connectors
    networks:
      - ytsoar
  ytsoar_nginx:
    build: ../app/nginx
    container_name: ytsoar_nginx
    ports:
      - "9999:9999"
    volumes:
      - ../app/nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    depends_on:
      - ytsoar_api
    networks:
      - ytsoar
volumes:
  postgres_data:
  rabbitmq_data:
