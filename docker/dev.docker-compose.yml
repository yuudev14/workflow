version: "3.9"
name: ytsoar
networks:
  ytsoar:
services:
  ytsoar_rabbitmq:
    image: rabbitmq:3-management
    container_name: ytsoar_rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ytsoar
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  ytsoar_postgres:
    image: postgres:15
    container_name: ytsoar_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ytsoar
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ytsoar
    volumes:
      - postgres_data:/var/lib/postgresql/data
  ytsoar_worker:
    build:
      context: ../app/connectors-service
      dockerfile: Dockerfile.worker
    image: ytsoar/worker:latest
    container_name: ytsoar_worker
    volumes:
      - ../app/connectors-service:/app
    environment:
      - CELERY_BROKER=pyamqp://guest:guest@ytsoar_rabbitmq:5672
      - CELERY_BACKEND=db+postgresql://postgres:password@ytsoar_postgres:5432/ytsoar?sslmode=disable
      - MQ_URL=amqp://guest:guest@ytsoar_rabbitmq:5672
      - grpc_workflow_host=ytsoar_api:50051
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
  ytsoar_connectors:
    build:
      context: ../app/connectors-service
      dockerfile: Dockerfile.dev
    image: ytsoar/connectors:latest
    container_name: ytsoar_connectors
    ports:
      - "8000:8000"
    expose:
      - "50052"
    volumes:
      - ../app/connectors-service:/app
    environment:
      - CELERY_BROKER=pyamqp://guest:guest@ytsoar_rabbitmq:5672
      - CELERY_BACKEND=db+postgresql://postgres:password@ytsoar_postgres:5432/ytsoar?sslmode=disable
      - MQ_URL=amqp://guest:guest@ytsoar_rabbitmq:5672
      - use_celery=true
      - grpc_workflow_host=ytsoar_api:50051
      - connector_runtime_port=50052
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
  ytsoar_api:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_api
    ports:
      - "8080:8080"
    volumes:
      - ../app/ytsoar:/app
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=ytsoar_postgres
      - DB_PORT=5432
      - DB_NAME=ytsoar
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - MQ_HOST=ytsoar_rabbitmq
      - MQ_PORT=5672
      - AIR_POLL=true
      - AIR_WATCH_TMOUT=500ms
      # EXECUTOR=python|go picks which executor consumes triggered playbooks
      - EXECUTOR=${EXECUTOR:-python}
      - GO_PLAYBOOK_QUEUE=playbook_go
      - STATUS_EXCHANGE=playbook.status
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
  ytsoar_playbook_worker:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_playbook_worker
    entrypoint:
      [
        "air",
        "--build.cmd",
        "go build -o ./tmp/worker ./cmd/worker",
        "--build.bin",
        "tmp/worker",
      ]
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - ../app/ytsoar:/app
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=ytsoar_postgres
      - DB_PORT=5432
      - DB_NAME=ytsoar
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - MQ_HOST=ytsoar_rabbitmq
      - MQ_PORT=5672
      - AIR_POLL=true
      - GO_PLAYBOOK_QUEUE=playbook_go
      - STATUS_EXCHANGE=playbook.status
      - SANDBOX_ADDR=ytsoar_sandbox:50052
    networks:
      - ytsoar
    depends_on:
      ytsoar_postgres:
        condition: service_healthy
      ytsoar_rabbitmq:
        condition: service_healthy
      ytsoar_sandbox:
        condition: service_started
      # migrations run in the API entrypoint; restart covers the race in dev
      ytsoar_api:
        condition: service_started
  ytsoar_sandbox:
    build:
      context: ../app/ytsoar
      dockerfile: Dockerfile.dev
    image: ytsoar/backend:latest
    container_name: ytsoar_sandbox
    entrypoint:
      [
        "air",
        "--build.cmd",
        "go build -o ./tmp/sandbox ./cmd/sandbox",
        "--build.bin",
        "tmp/sandbox",
      ]
    restart: unless-stopped
    mem_limit: 1g
    expose:
      - "50052"
    volumes:
      - ../app/ytsoar:/app
      # python connectors tree (contains connectors/ and src/, reused by the harness)
      - ../app/connectors-service:/opt/connectors
      - ../app/connectors-node:/connectors-node
    # deliberately NO DB_*/MQ_* env: the sandbox holds zero credentials
    environment:
      - AIR_POLL=true
      - SANDBOX_LISTEN_ADDR=:50052
      - CONNECTORS_DIR=/opt/connectors
      - CONNECTORS_NODE_DIR=/connectors-node
    networks:
      - ytsoar
  ytsoar_nginx:
    build: ../app/nginx
    container_name: ytsoar_nginx
    ports:
      - "9999:9999"
    volumes:
      - ../app/nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    depends_on:
      - ytsoar_connectors
      - ytsoar_api
    networks:
      - ytsoar
volumes:
  postgres_data:
  rabbitmq_data:
